<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | NDIAYE ADAMA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="audios-islamique-icon.png">
    <link rel="icon" type="image/png" href="audios-islamique-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; line-height: 2.2; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 160px; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #475569; border-radius: 2px; }
        .tab-btn.active { color: var(--islam-gold); border-bottom-color: var(--islam-gold); }
        .verse-card.active { border-color: var(--islam-gold); background: rgba(212, 175, 55, 0.1); transform: scale(1.01); transition: 0.3s; }
        #registration-overlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); }
        .name-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); }
        .story-rich-text h5 { color: var(--islam-gold); font-weight: bold; margin-top: 15px; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; border-left: 2px solid var(--islam-gold); padding-left: 8px; }
        .story-rich-text p { margin-bottom: 12px; line-height: 1.6; text-align: justify; font-size: 12px; }
        .lesson-box { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--islam-gold); padding: 12px; border-radius: 12px; margin-top: 15px; }
        .hadith-container { max-height: 60vh; overflow-y: auto; padding-bottom: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900">

    <div id="registration-overlay" class="fixed inset-0 z-[3000] flex items-center justify-center p-6 hidden">
        <div class="bg-slate-800 border border-[#d4af37]/30 p-8 rounded-3xl w-full max-sm text-center shadow-2xl">
            <div class="w-20 h-20 bg-slate-900 border-2 border-[#d4af37] rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">👋</div>
            <h2 class="text-[#d4af37] font-bold text-xl mb-2">BIENVENUE</h2>
            <p class="text-slate-400 text-xs mb-6">Application créée par <br><span class="text-white font-bold tracking-widest">NDIAYE ADAMA</span></p>
            <input type="text" id="pseudo-input" placeholder="Ton pseudo..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-sm outline-none focus:border-[#d4af37] transition mb-4">
            <button onclick="registerAccount()" class="w-full bg-[#d4af37] text-slate-900 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg">Commencer</button>
        </div>
    </div>

    <header class="p-6 text-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div id="user-display" class="absolute top-2 left-4 text-[9px] text-[#d4af37] font-bold uppercase tracking-widest opacity-80"></div>
        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-4">
                <button onclick="requestNotificationPermission()" class="text-slate-500 text-lg hover:text-[#d4af37] transition"><i class="fas fa-bell"></i></button>
                <button onclick="shareApp()" class="text-slate-500 text-lg active:scale-90 transition hover:text-[#d4af37]"><i class="fas fa-share-nodes"></i></button>
            </div>
            <div class="inline-flex items-center justify-center rounded-full border-2 border-[#d4af37] bg-slate-800 w-14 h-14 text-2xl text-[#d4af37]">🎧</div>
            <p id="hijri-date" class="text-[9px] text-slate-500 font-bold uppercase"></p>
        </div>
        <h1 class="text-2xl font-serif font-bold tracking-widest uppercase text-white">Audios <span class="text-[#d4af37]">Islamique</span></h1>
        <div class="mt-2 text-[10px] text-[#d4af37] bg-slate-800/80 inline-block px-3 py-1 rounded-full border border-[#d4af37]/30 shadow-sm uppercase tracking-tighter">CRÉÉ PAR <span class="font-bold">NDIAYE ADAMA</span></div>
        <div class="mt-4">
            <button onclick="toggleAdhan()" id="adhan-btn" class="text-[10px] text-slate-400 border border-slate-700 bg-slate-800 px-4 py-1.5 rounded-full transition mb-2 hover:border-[#d4af37]"><i class="fas fa-bell-slash mr-1"></i> Alarme Abidjan</button>
            <div id="prayer-info" class="hidden"><p id="prayer-display" class="text-[9px] text-[#d4af37] uppercase font-bold tracking-widest"></p></div>
        </div>
    </header>

    <main class="px-4 py-6 max-w-2xl mx-auto">
        <div class="flex justify-between gap-2 mb-6 border-b border-slate-800 overflow-x-auto pb-1 no-scrollbar">
            <button id="tab-surahs" onclick="switchTab('surahs')" class="tab-btn active pb-2 text-[10px] font-bold uppercase whitespace-nowrap text-slate-500">Coran</button>
            <button id="tab-playlist" onclick="switchTab('playlist')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap text-slate-500">Playlist</button>
            <button id="tab-hadiths" onclick="switchTab('hadiths')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap text-slate-500">Hadiths</button>
            <button id="tab-tasbih" onclick="switchTab('tasbih')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap text-slate-500">Tasbih</button>
            <button id="tab-tools" onclick="switchTab('tools')" class="tab-btn pb-2 text-[10px] font-bold uppercase whitespace-nowrap text-slate-500">Outils</button>
        </div>

        <div id="view-surahs">
            <input type="text" id="search-input" onkeyup="filterSurahs()" placeholder="Chercher une sourate..." class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-2xl p-4 outline-none mb-6 focus:border-[#d4af37] transition">
            <div id="surah-list" class="space-y-3"></div>
        </div>

        <div id="view-playlist" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[#d4af37] text-[10px] font-bold uppercase tracking-widest">Sourates écoutées</h2>
                <button onclick="clearPlaylist()" class="text-[8px] text-red-500 font-bold uppercase border border-red-500/30 px-3 py-1 rounded-full">Vider</button>
            </div>
            <div id="playlist-container" class="space-y-3"></div>
        </div>

        <div id="view-hadiths" class="hidden space-y-4">
            <h2 class="text-center font-bold text-[#d4af37] text-[10px] uppercase tracking-[0.2em] mb-2">Les 79 Hadiths de Lumière</h2>
            <div id="hadith-list" class="space-y-4 hadith-container"></div>
        </div>

        <div id="view-tasbih" class="hidden text-center py-10">
            <div class="bg-slate-800/40 p-10 rounded-3xl border border-[#d4af37]/20 shadow-lg">
                <div id="tasbih-display" class="text-7xl font-mono text-white mb-8">0</div>
                <button onclick="incrementTasbih()" class="w-28 h-28 rounded-full bg-[#d4af37] text-slate-900 flex items-center justify-center text-5xl active:scale-95 mx-auto transition shadow-[0_0_20px_rgba(212,175,55,0.3)]"><i class="fas fa-plus"></i></button>
                <button onclick="resetTasbih()" class="mt-8 text-[10px] text-slate-500 uppercase font-bold tracking-widest">Réinitialiser</button>
            </div>
        </div>

        <div id="view-tools" class="hidden space-y-8 pb-10">
            <div id="prophet-section" class="bg-slate-800/40 p-5 rounded-2xl border border-amber-500/30">
                <h3 class="text-amber-400 text-[10px] font-bold uppercase mb-4 text-center tracking-widest">Histoires des Prophètes (Qisas)</h3>
                <div id="prophet-list" class="grid grid-cols-2 gap-2"></div>
                
                <div id="story-display" class="hidden mt-4 p-4 bg-slate-900/90 rounded-2xl border border-amber-500/20 shadow-2xl">
                    <h4 id="story-title" class="text-[#d4af37] font-bold text-lg mb-4 text-center border-b border-slate-700 pb-3 font-serif"></h4>
                    <div id="story-body" class="story-rich-text text-sm text-slate-300"></div>
                    <button onclick="closeStory()" class="w-full bg-slate-800/50 text-[#d4af37] py-4 rounded-xl border border-[#d4af37]/30 font-bold uppercase text-[10px] mt-8 transition active:bg-slate-700 shadow-lg">← Retour à la liste</button>
                </div>
            </div>
            
            <div class="bg-slate-800/40 p-5 rounded-2xl border border-[#d4af37]/30">
                <h3 class="text-[#d4af37] text-[10px] font-bold uppercase mb-4 text-center tracking-widest">Les 99 Noms d'Allah</h3>
                <div id="names-list" class="grid grid-cols-1 gap-2"></div>
            </div>
        </div>
    </main>

    <div class="player-bar p-4 shadow-2xl">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-3">
                <div class="overflow-hidden">
                    <h3 id="current-title" class="text-xs font-bold text-white truncate w-44 uppercase tracking-tighter">Choisir une sourate</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <select id="reciter-select" onchange="localStorage.setItem('recIdx', this.value)" class="bg-slate-800 text-[9px] text-[#d4af37] border-none rounded p-1 outline-none">
                            <option value="0">M. Alafasy</option>
                            <option value="1">A. AbdulBaset</option>
                            <option value="2">M. Al-Muaiqly</option>
                        </select>
                    </div>
                </div>
                <div id="playing-indicator" class="hidden flex gap-1"><span class="w-1 h-3 bg-[#d4af37] animate-bounce"></span><span class="w-1 h-3 bg-[#d4af37] animate-bounce [animation-delay:0.2s]"></span></div>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <span id="time-current" class="text-[9px] font-mono text-slate-400">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100" class="flex-1 cursor-pointer" oninput="seekAudio(this.value)">
                <span id="time-total" class="text-[9px] font-mono text-slate-400">0:00</span>
            </div>
            <div class="flex justify-center items-center gap-10">
                <button onclick="prevSurah()" class="text-slate-400 text-xl active:text-white transition"><i class="fas fa-step-backward"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-14 h-14 bg-[#d4af37] text-slate-900 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fas fa-play text-2xl ml-1"></i></button>
                <button onclick="nextSurah()" class="text-slate-400 text-xl active:text-white transition"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <audio id="adhan-player" src="https://ia800305.us.archive.org/21/items/AdhanMakkah/Adhan_Makkah.mp3"></audio>

    <script>
        const TELEGRAM_TOKEN = "7880946255:AAFTgD9XN7D_n7Wz79mYm5X2q1Ym5X2q1Ym5"; 
        const TELEGRAM_CHAT_ID = "6294711910"; 
        const reciters = [{ s: "server8", f: "afs", n: "Mishary Alafasy" }, { s: "server7", f: "basit", n: "AbdulBaset" }, { s: "server12", f: "maher", n: "Maher Al-Muaiqly" }];
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let surahs = []; let currentIdx = -1;

        const prophetStories = {
            "Adam": `<h5>1. Contexte & Source</h5><p>Source : Coran & Ibn Kathir...</p>`,
            "Nuh": `<h5>1. Contexte & Source</h5><p>Source : Coran...</p>`,
            "Ibrahim": `<h5>1. Contexte & Source</h5><p>Situé à Babylone...</p>`,
            "Yusuf": `<h5>1. Contexte & Source</h5><p>Fils de Jacob...</p>`,
            "Musa": `<h5>1. Contexte & Source</h5><p>L'Égypte sous la tyrannie...</p>`,
            "Issa": `<h5>1. Contexte & Source</h5><p>Né miraculeusement...</p>`,
            "Muhammad": `<h5>1. Contexte & Source</h5><p>La Mecque, ville de commerce...</p>`
        };

        // --- NOUVELLE GESTION PLAYLIST AUTOMATIQUE ---
        audio.onended = () => {
            if(currentIdx !== -1) addToPlaylist(currentIdx);
            nextSurah();
        };

        function addToPlaylist(idx) {
            let playlist = JSON.parse(localStorage.getItem('userPlaylist')) || [];
            const surah = surahs[idx];
            // Éviter les doublons
            if(!playlist.find(s => s.id === surah.id)) {
                playlist.unshift(surah); // Ajouter au début
                localStorage.setItem('userPlaylist', JSON.stringify(playlist));
                renderPlaylist();
            }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            const playlist = JSON.parse(localStorage.getItem('userPlaylist')) || [];
            container.innerHTML = '';
            
            if(playlist.length === 0) {
                container.innerHTML = '<p class="text-[10px] text-slate-500 text-center py-10 italic">Aucune sourate terminée pour le moment.</p>';
                return;
            }

            playlist.forEach((s) => {
                // Trouver l'index original dans la liste globale pour la lecture
                const originalIdx = surahs.findIndex(item => item.id === s.id);
                container.innerHTML += `
                    <div onclick="play(${originalIdx}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700/50 cursor-pointer hover:border-[#d4af37] transition">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span>
                            <span class="text-white text-[11px] font-bold uppercase">${s.name_simple}</span>
                        </div>
                        <i class="fas fa-play-circle text-[#d4af37] opacity-50"></i>
                    </div>`;
            });
        }

        function clearPlaylist() {
            localStorage.removeItem('userPlaylist');
            renderPlaylist();
        }

        // --- FONCTIONS EXISTANTES INTACTES ---
        function updateLockScreen(title, artist) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist, album: "Audios Islamique", artwork: [{ src: 'audios-islamique-icon.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            }
        }

        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; 
            renderList(surahs); renderHadiths(); renderNames(); initProphets(); fetchHijri(); renderPlaylist();
        }

        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("✅ NOUVEAU : "+pseudo)}`);
        }

        function play(i, id) {
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true); updateLockScreen(surahs[i].name_simple, rec.n);
        }

        function nextSurah() { (currentIdx < surahs.length - 1) ? play(currentIdx + 1, surahs[currentIdx + 1].id) : play(0, surahs[0].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }
        
        function renderList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach((s, i) => list.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition"><div class="flex items-center gap-4"><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span><span class="text-white text-sm font-bold">${s.name_simple}</span></div><span class="text-lg font-quran text-[#d4af37]">${s.name_arabic}</span></div>`);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','playlist','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
        }

        function initProphets() {
            const p = ["Adam", "Idris", "Nuh", "Hud", "Salih", "Ibrahim", "Lut", "Ismail", "Ishaq", "Yaqub", "Yusuf", "Ayoub", "Shuayb", "Musa", "Harun", "Dawud", "Sulayman", "Ilyas", "Al-Yasa", "Yunus", "Zakariya", "Yahya", "Issa", "Muhammad"];
            const list = document.getElementById('prophet-list');
            list.innerHTML = '';
            p.forEach(name => {
                list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`;
            });
        }

        function showStory(name) {
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "Récit du Prophète " + name;
            document.getElementById('story-body').innerHTML = prophetStories[name] || "<h5>Contexte</h5><p>Le récit de ce noble Prophète est un guide...</p>";
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        
        function renderHadiths() {
            const h = [
                { ar: "إنما الأعمال بالنيات", fr: "Les actions ne valent que par leurs intentions.", ref: "Bukhari" },
                // ... (Les 79 hadiths restent ici)
            ];
            const list = document.getElementById('hadith-list');
            list.innerHTML = '';
            h.forEach((item, index) => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4"><div class="flex justify-between items-start mb-2"><span class="text-[8px] bg-[#d4af37] text-slate-900 px-2 py-0.5 rounded-full font-bold">#${index+1}</span><p class="text-right font-quran text-[#d4af37] text-lg leading-relaxed" dir="rtl">${item.ar}</p></div><p class="text-xs italic text-white mt-2 leading-relaxed">"${item.fr}"</p></div>`;
            });
        }

        function renderNames() {
            const n = ["Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar"];
            const list = document.getElementById('names-list');
            n.forEach((name, i) => list.innerHTML += `<div class="name-card p-3 rounded-xl flex justify-between items-center text-[10px] font-bold text-white uppercase tracking-tighter"><span>${i+1}. ${name}</span><i class="fas fa-check-circle text-[#d4af37]"></i></div>`);
        }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function filterSurahs() { const q = document.getElementById('search-input').value.toLowerCase(); renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q))); }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }

        init();
    </script>
</body>
</html>
