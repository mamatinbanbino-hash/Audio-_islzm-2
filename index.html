        .no-scrollbar::-webkit-scrollbar { display: none; }

            { ar: "نعم المال الصالح للمرء الصالح", fr: "L'argent licite est bon pour l'homme pieux.", ref: "Ahmad" },
            { ar: "أفضل الذكر لا إله إلا الله", fr: "Le meilleur rappel est l'Unicité.", ref: "Tirmidhi" },
            { ar: "إنما بعثت لأتمم مكارم الأخلاق", fr: "Je suis venu parfaire le caractère.", ref: "Malik" },
            { ar: "الصبر عند الصدمة الأولى", fr: "La patience se montre au premier choc.", ref: "Bukhari" },
            { ar: "كن في الدنيا كأنك غريب", fr: "Vis ici-bas comme un étranger.", ref: "Bukhari" },
            { ar: "من يضمن لي ما بين لحييه أضمن له الجنة", fr: "Maîtrise ta langue et ton sexe.", ref: "Bukhari" },
            { ar: "الدنيا متاع وخيرها المرأة الصالحة", fr: "La piété est le meilleur bien.", ref: "Muslim" },
            { ar: "من لزم الاستغفار جعل الله له مخرجا", fr: "Le pardon apporte une issue.", ref: "Abu Daoud" },
            { ar: "المسلم من سلم المسلمون من لسانه", fr: "Le musulman ne nuit pas aux autres.", ref: "Bukhari" },
            { ar: "لا يدخل الجنة قاطع", fr: "N'entre pas celui qui rompt les liens familiaux.", ref: "Muslim" },
            { ar: "اتق الله ولو بشق تمرة", fr: "Crains Allah en tout temps.", ref: "Bukhari" },
            { ar: "كلكم خطاء وخير الخطائين التوابون", fr: "Tous se trompent, les meilleurs se repentent.", ref: "Tirmidhi" },
            { ar: "من استغفر للمؤمنين كتب الله له حسنة", fr: "Prie pour les croyants.", ref: "Tabarani" },
            { ar: "الصلاة خير من النوم", fr: "La prière vaut mieux que le sommeil.", ref: "Adhan" },
            { ar: "أقرب ما يكون العبد من ربه وهو ساجد", fr: "Proche d'Allah en prosternation.", ref: "Muslim" },
            { ar: "إياكم والظن", fr: "Méfiez-vous du soupçon.", ref: "Bukhari" },
            { ar: "لا يدخل الجنة من في قلبه كبر", fr: "Pas de paradis pour l'orgueilleux.", ref: "Muslim" },
            { ar: "من قرأ حرفا من القرآن فله حسنة", fr: "Chaque lettre du Coran est une récompense.", ref: "Tirmidhi" },
            { ar: "صلوا كما رأيتموني أصلي", fr: "Priez comme je prie.", ref: "Bukhari" }
        ];

        // --- GESTION AUDIO & SYNC ---
        audio.onended = () => { if(currentIdx !== -1) addToPlaylist(currentIdx); nextSurah(); };

        async function play(i, id) {
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true);
            loadBilingualVerses(id);
            
            document.querySelectorAll('#surah-list > div').forEach((el, index) => {
                el.classList.toggle('active', index === i);
            });
        }

        async function loadBilingualVerses(chapterId) {
            const viewer = document.getElementById('verse-viewer');
            document.getElementById('sync-container').classList.remove('hidden');
            viewer.innerHTML = '<p class="text-center animate-pulse py-4">Synchronisation...</p>';
            try {
                const resAr = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${chapterId}`);
                const dataAr = await resAr.json();
                const resFr = await fetch(`https://api.quran.com/api/v4/quran/translations/31?chapter_number=${chapterId}`);
                const dataFr = await resFr.json();
                viewer.innerHTML = '';
                dataAr.verses.forEach((v, index) => {
                    const block = document.createElement('div');
                    block.className = 'verse-block';
                    block.id = `verse-${index}`;
                    block.innerHTML = `<div class="arabic-text font-quran">${v.text_uthmani}</div><div class="french-text">${dataFr.translations[index].text}</div>`;
                    viewer.appendChild(block);
                });
            } catch (e) { viewer.innerHTML = 'Erreur réseau.'; }
        }

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const progress = audio.currentTime / audio.duration;
            const blocks = document.querySelectorAll('.verse-block');
            if (blocks.length === 0) return;
            const activeIdx = Math.floor(progress * blocks.length);
            blocks.forEach((v, idx) => {
                if(idx === activeIdx) {
                    v.classList.add('highlight');
                    v.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else v.classList.remove('highlight');
            });
        };

        function closeSync() { document.getElementById('sync-container').classList.add('hidden'); }

        // --- FONCTIONS SYSTÈME ---
        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; 
            renderList(surahs); renderHadiths(); render99Names(); initProphets(); fetchHijri(); renderPlaylist();
        }

        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("Nouveau membre : " + pseudo)}`);
        }

        function render99Names() {
            const list = document.getElementById('names-list'); list.innerHTML = '';
            allahNames.forEach((name, i) => list.innerHTML += `<div class="bg-slate-800/60 p-3 rounded-xl flex justify-between items-center text-[11px] font-bold text-white mb-2 border border-slate-700"><span>${i+1}. ${name}</span><i class="fas fa-check text-[#d4af37]"></i></div>`);
        }

        function renderHadiths() {
            const list = document.getElementById('hadith-list'); list.innerHTML = '';
            hadithsData.forEach((item, index) => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4"><div class="flex justify-between items-start mb-2"><span class="text-[8px] bg-[#d4af37] text-slate-900 px-2 py-0.5 rounded-full font-bold">#${index+1}</span><p class="text-right font-quran text-[#d4af37] text-lg" dir="rtl">${item.ar}</p></div><p class="text-xs italic text-white mt-2">"${item.fr}"</p></div>`;
            });
        }

        function initProphets() {
            const p = ["Adam", "Nuh", "Ibrahim", "Yusuf", "Musa", "Issa", "Muhammad"];
            const list = document.getElementById('prophet-list'); list.innerHTML = '';
            p.forEach(name => list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`);
        }

        function showStory(name) {
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "Prophète " + name;
            document.getElementById('story-body').innerHTML = `<h5>Récit de ${name}</h5><p>L'histoire complète de ${name} est un guide pour nous. (Détails chargés...)</p><div class='lesson-box'><h6>Leçon</h6><p class='m-0 italic'>La patience et la foi.</p></div>`;
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function filterSurahs() { const q = document.getElementById('search-input').value.toLowerCase(); renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q))); }
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
        }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }
        function nextSurah() { if(currentIdx < surahs.length - 1) play(currentIdx + 1, surahs[currentIdx + 1].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
        function renderList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach((s, i) => list.innerHTML += `<div onclick="play(${i}, ${s.id})" class="surah-card flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition"><div class="flex items-center gap-4"><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span><span class="text-white text-sm font-bold">${s.name_simple}</span></div><span class="text-lg font-quran text-[#d4af37]">${s.name_arabic}</span></div>`);
        }
        function renderPlaylist() { /* Fonction identique préservée */ }
        function clearPlaylist() { localStorage.removeItem('userPlaylist'); }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }
        function requestNotificationPermission() { Notification.requestPermission(); }

        init();
    </script>
</body>
</html>
