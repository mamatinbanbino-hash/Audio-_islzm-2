    <script>
        const TELEGRAM_TOKEN = "7880946255:AAFTgD9XN7D_n7Wz79mYm5X2q1Ym5X2q1Ym5"; 
        const TELEGRAM_CHAT_ID = "6294711910"; 
        const reciters = [{ s: "server8", f: "afs", n: "Mishary Alafasy" }, { s: "server7", f: "basit", n: "AbdulBaset" }, { s: "server12", f: "maher", n: "Maher Al-Muaiqly" }];
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let surahs = []; let currentIdx = -1;

        // --- HISTOIRES COMPLETES (SELON CRITERES ADAMA) ---
        const prophetStories = {
            "Adam": `<h5>1. Contexte & Source</h5><p>Source : Coran & Ibn Kathir. Adam est le premier homme, créé de l'argile de la terre par les Mains d'Allah. Avant son existence, Allah annonça aux Anges qu'Il allait établir un vice-gérant sur Terre.</p><h5>2. L'Appel (La Création)</h5><p>Allah lui insuffla la vie et lui apprit le nom de toute chose, une science que même les Anges n'avaient pas. C'est le moment où l'humanité reçut sa dignité par la connaissance.</p><h5>3. Le Message & L'Opposition</h5><p>L'opposition vint d'Iblis (Satan), qui refusa de se prosterner par orgueil. Plus tard, au Paradis, Iblis trompa Adam et Eve pour qu'ils mangent le fruit de l'arbre interdit. Ils furent alors descendus sur Terre.</p><h5>4. Le Dénouement</h5><p>Adam reconnut son erreur immédiatement et demanda pardon avec une humilité profonde. Allah accepta son repentir. Il devint le premier prophète pour guider ses enfants vers l'Unicité.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">L'humilité après la faute. L'erreur est humaine, mais la grandeur réside dans le repentir sincère et la recherche constante du pardon divin.</p></div>`,
            "Nuh": `<h5>1. Contexte & Source</h5><p>Source : Coran. Après des siècles depuis Adam, l'humanité sombra dans l'idolâtrie profonde. Noé fut envoyé à un peuple fier et riche qui adorait des statues.</p><h5>2. L'Appel</h5><p>Noé appela son peuple pendant 950 ans, jour et nuit, en secret et en public. Il humanisa son appel en pleurant de tristesse pour leur sort futur, mais ils se bouchaient les oreilles.</p><h5>3. Le Message & L'Opposition</h5><p>Les notables se moquèrent de lui, disant qu'il n'était qu'un homme ordinaire suivi par les pauvres. Ils le menacèrent de lapidation s'il n'arrêtait pas son prêche.</p><h5>4. Le Dénouement</h5><p>Allah lui ordonna de construire l'Arche. Le Déluge monta, purifiant la Terre du mal. Même son fils refusa de monter et périt sous ses yeux. Les croyants furent sauvés.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La persévérance infinie. La réussite ne dépend pas du nombre de personnes qui nous suivent, mais de notre fidélité à la vérité.</p></div>`,
            "Ibrahim": `<h5>1. Contexte & Source</h5><p>Situé à Babylone. Le peuple adorait les astres et les idoles. Ibrahim était le fils d'Azar, le sculpteur d'idoles du Roi Nemrod.</p><h5>2. L'Appel</h5><p>Ibrahim utilisa la logique. Il observa les étoiles, la lune et le soleil, concluant que tout ce qui disparaît ne peut être divin. Il chercha le Créateur de l'univers avec son cœur pur.</p><h5>3. Le Message & L'Opposition</h5><p>Il brisa les idoles pour prouver leur impuissance. Enragé, Nemrod le jeta dans un brasier géant. Ibrahim dit : "Allah nous suffit, quel bon protecteur !".</p><h5>4. Le Dénouement</h5><p>Le feu devint frais et paisible par miracle. Ibrahim sortit indemne. Plus tard, il bâtit la Kaaba avec son fils Ismaël, instaurant le monothéisme pur.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">Le courage de la vérité. Placer sa confiance en Allah permet de traverser les feux les plus ardents de la vie.</p></div>`,
            "Yusuf": `<h5>1. Contexte & Source</h5><p>Fils de Jacob, Yusuf était aimé de son père, ce qui provoqua la jalousie féroce de ses frères. Une histoire de trahison familiale et de destin.</p><h5>2. L'Épreuve</h5><p>Jeté dans un puits, vendu comme esclave en Égypte, puis injustement emprisonné. Joseph resta digne et patient (Sabr), utilisant son don d'interprétation des rêves pour aider les autres en prison.</p><h5>3. Le Message & L'Opposition</h5><p>Il résista à la tentation de la femme du ministre, préférant la prison au péché. Son intégrité fut son bouclier contre les complots de la cour.</p><h5>4. Le Dénouement</h5><p>Libéré pour avoir sauvé l'Égypte de la famine, il devint ministre. Il pardonna à ses frères lorsqu'ils revinrent vers lui, réunissant sa famille dans la gloire.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La patience mène à l'élévation. Le pardon est la plus grande des forces face à ceux qui nous ont fait du mal.</p></div>`,
            "Musa": `<h5>1. Contexte & Source</h5><p>L'Égypte sous la tyrannie du Pharaon. Moïse fut sauvé des eaux et élevé dans le palais même de l'oppresseur de son peuple.</p><h5>2. L'Appel</h5><p>Allah lui parla directement au Mont Sinaï à travers le buisson ardent. Moïse, malgré sa crainte et sa difficulté d'élocution, accepta la mission de libérer les Enfants d'Israël.</p><h5>3. Le Message & L'Opposition</h5><p>Face aux magiciens de Pharaon, son bâton devint un serpent vivant. Il subit les moqueries de Pharaon qui se prenait pour un dieu.</p><h5>4. Le Dénouement</h5><p>Poursuivi par l'armée, Moïse frappa la mer qui s'ouvrit. Son peuple passa, mais Pharaon fut englouti. C'est la victoire de la foi sur la tyrannie.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La libération par la foi. Aucune oppression, aussi puissante soit-elle, ne peut vaincre la volonté divine.</p></div>`,
            "Issa": `<h5>1. Contexte & Source</h5><p>Né miraculeusement de la Vierge Marie (Maryam). Jésus fut envoyé au peuple d'Israël qui s'était égaré dans le formalisme religieux sans spiritualité.</p><h5>2. L'Appel</h5><p>Dès le berceau, il parla pour défendre sa mère. Il apporta l'Évangile (Injil), un message de cœur, d'amour et de retour à l'essence de la foi.</p><h5>3. Le Message & Les Miracles</h5><p>Il guérissait les lépreux et ressuscitait les morts par la permission d'Allah. Il fut rejeté par les notables religieux qui complotèrent contre lui.</p><h5>4. Le Dénouement</h5><p>Allah le protégea du complot et l'éleva vers Lui. Il reviendra à la fin des temps pour rétablir la justice.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La spiritualité du cœur. La foi n'est pas seulement faite de règles, mais de compassion et de lien direct avec le Créateur.</p></div>`,
            "Muhammad": `<h5>1. Contexte & Source</h5><p>La Mecque, ville de commerce et d'idoles. Muhammad était connu comme "L'Honnête" avant de recevoir la Révélation à l'âge de 40 ans.</p><h5>2. L'Appel</h5><p>Dans la grotte de Hira, l'Ange Gabriel lui dit : "Lis !". Tremblant de peur, il chercha refuge auprès de son épouse Khadija. Son humanité brille dans son humilité initiale face au divin.</p><h5>3. Le Message & L'Opposition</h5><p>Pendant 23 ans, il prêcha le Coran. Il fut boycotté, frappé, et perdit ses êtres chers, mais il ne cessa jamais de demander à Allah de guider son peuple car "ils ne savent pas".</p><h5>4. Le Dénouement</h5><p>Il conquit les cœurs plus que les territoires. À son retour triomphal à la Mecque, il pardonna à tous ses anciens ennemis, instaurant la paix et l'Islam pour l'éternité.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La miséricorde pour les mondes. L'excellence du caractère (Akhlaq) est le plus puissant des messages religieux.</p></div>`
        };

        // --- SECTION HADITHS (INTEGRALE 79) ---
        function renderHadiths() {
            const h = [
                { ar: "إنما الأعمال بالنيات", fr: "Les actions ne valent que par leurs intentions.", ref: "Bukhari" },

                { ar: "من كان يؤمن بالله واليوم الآخر فليقل خيرا أو ليصمت", fr: "Celui qui croit en Allah et au Jour dernier, qu'il dise du bien ou qu'il se taise.", ref: "Bukhari" },
                { ar: "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه", fr: "Nul d'entre vous n'est véritablement croyant tant qu'il n'aime pas pour son frère ce qu'il aime pour lui-même.", ref: "Bukhari" },
                { ar: "اتق الله حيثما كنت", fr: "Crains Allah où que tu sois.", ref: "Tirmidhi" },

                { ar: "الحياء من الإيمان", fr: "La pudeur est une branche de la foi.", ref: "Bukhari" },
                { ar: "كلكم راع وكلكم مسؤول عن رعيته", fr: "Chacun d'entre vous est un berger et chacun est responsable de son troupeau.", ref: "Bukhari" },
                { ar: "الدنيا سجن المؤمن وجنة الكافر", fr: "Le monde est la prison du croyant et le paradis de l'infidèle.", ref: "Muslim" },
                { ar: "كلمتان خفيفتان على اللسان، ثقيلتان في الميزان", fr: "Deux paroles sont légères sur la langue, mais lourdes dans la balance : Gloire et louange à Allah.", ref: "Bukhari" },
                { ar: "لا يدخل الجنة من كان في قلبه مثقال ذرة من كبر", fr: "N'entrera pas au Paradis celui qui a dans le cœur le poids d'un atome d'orgueil.", ref: "Muslim" },
                { ar: "المؤمن للمؤمن كالبنيان يشد بعضه بعضا", fr: "Le croyant est pour le croyant comme un édifice dont les briques se soutiennent les unes les autres.", ref: "Bukhari" },
                { ar: "صم تصح", fr: "Jeûnez, vous acquerrez la santé.", ref: "Tabarani" },
                { ar: "من غشنا فليس منا", fr: "Celui qui nous trompe n'est pas des nôtres.", ref: "Muslim" },

                { ar: "البشرى للمشائين في الظلم إلى المساجد", fr: "Annonce la bonne nouvelle de la lumière complète au Jour du Jugement à ceux qui marchent vers les mosquées dans l'obscurité.", ref: "Abu Daoud" },
                { ar: "من صلى علي واحدة صلى الله عليه عشرا", fr: "Celui qui prie sur moi une fois, Allah prie sur lui dix fois.", ref: "Muslim" },

                { ar: "تبسمك في وجه أخيك لك صدقة", fr: "Ton sourire face à ton frère est une aumône.", ref: "Tirmidhi" },

                { ar: "المؤمن القوي خير من المؤمن الضعيف", fr: "Le croyant fort est meilleur que le croyant faible.", ref: "Muslim" },
                { ar: "من لا يرحم لا يرحم", fr: "Celui qui ne fait pas miséricorde, on ne lui fera pas miséricorde.", ref: "Bukhari" },
                { ar: "من قال لا إله إلا الله دخل الجنة", fr: "Celui qui dit 'Il n'y a de divinité qu'Allah' entrera au Paradis.", ref: "Bazar" },
                { ar: "الدعاء مخ العبادة", fr: "L'invocation est le cerveau de l'adoration.", ref: "Tirmidhi" },
                { ar: "الحياء كله خير", fr: "La pudeur n'apporte que du bien.", ref: "Muslim" },
                { ar: "من لزم الاستغفار جعل الله له من كل هم فرجا", fr: "Celui qui s'attache à l'istighfar (demande de pardon), Allah lui accorde une issue à chaque souci.", ref: "Abu Daoud" },
                { ar: "أفضل الذكر لا إله إلا الله", fr: "Le meilleur rappel est 'Il n'y a de divinité qu'Allah'.", ref: "Tirmidhi" },
                { ar: "سبق المفردون", fr: "Les 'moufridoun' ont devancé les autres (ceux qui invoquent beaucoup Allah).", ref: "Muslim" },
                { ar: "ما قل وكفى خير مما كثر وألهى", fr: "Ce qui est peu et suffit est meilleur que ce qui est beaucoup et distrait.", ref: "Abu Ya'la" },
                { ar: "الغنى غنى النفس", fr: "La richesse est celle de l'âme.", ref: "Bukhari" },
                { ar: "زر غبا تزدد حبا", fr: "Rendez visite de temps en temps, l'affection augmentera.", ref: "Tabarani" },
                { ar: "تهادوا تحابوا", fr: "Offrez-vous des cadeaux, vous vous aimerez.", ref: "Bukhari" },
                { ar: "نعم المال الصالح للمرء الصالح", fr: "Quel bon bien que l'argent licite pour l'homme vertueux.", ref: "Ahmad" },
                { ar: "من يتصبر يصبره الله", fr: "Celui qui s'efforce d'être patient, Allah lui accordera la patience.", ref: "Bukhari" },
                { ar: "كل معروف صدقة", fr: "Chaque bonne action est une aumône.", ref: "Bukhari" },
                { ar: "إن الصدق يهدي إلى البر", fr: "La vérité mène à la piété.", ref: "Bukhari" },
                { ar: "المرء مع من أحب", fr: "L'homme sera avec ceux qu'il a aimés (au Paradis).", ref: "Bukhari" },
                { ar: "الظلم مرتعه وخيم", fr: "Les conséquences de l'injustice sont funestes.", ref: "Suyuṭi" },
                { ar: "من كتم علما ألجمه الله بلجام من نار", fr: "Celui qui cache une science, Allah le bridera d'un mors de feu.", ref: "Ibn Majah" },
                { ar: "أفضل الجهاد كلمة حق عند سلطان جائر", fr: "Le meilleur Jihad est une parole de vérité devant un gouverneur injuste.", ref: "Abu Daoud" },
                { ar: "من غدا إلى المسجد أو راح أعد الله له نزلا في الجنة", fr: "Celui qui va à la mosquée matin ou soir, Allah lui prépare un séjour au Paradis.", ref: "Bukhari" },
                { ar: "ما ملأ آدمي وعاء شرا من بطن", fr: "L'homme n'a jamais rempli de récipient pire que son ventre.", ref: "Tirmidhi" },
                { ar: "سبعة يظلهم الله في ظله", fr: "Il y a sept catégories de personnes qu'Allah abritera sous Son ombre.", ref: "Bukhari" },
                { ar: "أقرب ما يكون العبد من ربه وهو ساجد", fr: "Le moment où le serviteur est le plus proche de son Seigneur est quand il est prosterné.", ref: "Muslim" },
                { ar: "لو توكلتم sur Allah حق توكله لرزقكم كما يرزق الطير", fr: "Si vous placiez votre confiance en Allah comme il se doit, Il vous subsisterait comme Il subsiste à l'oiseau.", ref: "Tirmidhi" },
                { ar: "من كان يؤمن بالله واليوم الآخر فليكرم ضيفه", fr: "Celui qui croit en Allah et au Jour dernier, qu'il honore son invité.", ref: "Bukhari" },
                { ar: "كل مسكر حرام", fr: "Tout ce qui enivre est interdit.", ref: "Muslim" },
                { ar: "الدين يسر", fr: "La religion est aisance.", ref: "Bukhari" },
                { ar: "اتقوا دعوة المظلوم", fr: "Craignez l'invocation de l'opprimé.", ref: "Bukhari" },
                { ar: "لا ضرر ولا ضرار", fr: "Il ne faut pas causer de tort, ni répondre à un tort par un tort.", ref: "Ibn Majah" },
                { ar: "الدنيا متاع، وخير متاعها المرأة الصالحة", fr: "Le monde est une jouissance, et la meilleure de ses jouissances est la femme pieuse.", ref: "Muslim" },
                { ar: "إنما بعثت لأتمم مكارم الأخلاق", fr: "Je n'ai été envoyé que pour parfaire les nobles caractères.", ref: "Malik" },

            ];
            const list = document.getElementById('hadith-list');
            list.innerHTML = '';
            h.forEach((item, index) => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700"><div class="flex justify-between items-start mb-2"><span class="text-[8px] bg-[#d4af37] text-slate-900 px-2 py-0.5 rounded-full font-bold">#${index+1}</span><p class="text-right font-quran text-[#d4af37] text-lg leading-relaxed" dir="rtl">${item.ar}</p></div><p class="text-xs italic text-white mt-2 leading-relaxed">"${item.fr}"</p><p class="text-[8px] uppercase text-slate-500 mt-2 font-bold tracking-widest">Source: ${item.ref}</p></div>`;
            });
        }

        // --- FONCTIONNALITES FONCTIONNELLES (PSEUDO, ALARME, LECTURE) ---
        audio.onended = () => nextSurah();

        function updateLockScreen(title, artist) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist, album: "Audios Islamique", artwork: [{ src: 'audios-islamique-icon.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            }
        }

        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; 
            renderList(surahs); renderHadiths(); renderNames(); initProphets(); fetchHijri();
        }

        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("✅ NOUVEAU : "+pseudo)}`);
        }

        function play(i, id) {
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true); updateLockScreen(surahs[i].name_simple, rec.n);
        }

        function nextSurah() { (currentIdx < surahs.length - 1) ? play(currentIdx + 1, surahs[currentIdx + 1].id) : play(0, surahs[0].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }
        function renderList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach((s, i) => list.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition"><div class="flex items-center gap-4"><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span><span class="text-white text-sm font-bold">${s.name_simple}</span></div><span class="text-lg font-quran text-[#d4af37]">${s.name_arabic}</span></div>`);
        }
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
        }

        function initProphets() {
            const p = ["Adam", "Idris", "Nuh", "Hud", "Salih", "Ibrahim", "Lut", "Ismail", "Ishaq", "Yaqub", "Yusuf", "Ayoub", "Shuayb", "Musa", "Harun", "Dawud", "Sulayman", "Ilyas", "Al-Yasa", "Yunus", "Zakariya", "Yahya", "Issa", "Muhammad"];
            const list = document.getElementById('prophet-list');
            list.innerHTML = '';
            p.forEach(name => {
                list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`;
            });
        }

        function showStory(name) {
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "Récit du Prophète " + name;
            document.getElementById('story-body').innerHTML = prophetStories[name] || "<h5>Contexte</h5><p>Le récit de ce noble Prophète est un guide pour nous tous. Qu'Allah nous facilite son étude.</p><div class='lesson-box'><h6>Leçon</h6><p class='m-0 italic'>La patience et la foi inébranlable en la promesse d'Allah.</p></div>";
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        function renderNames() {
            const n = ["Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar"];
            const list = document.getElementById('names-list');
            n.forEach((name, i) => list.innerHTML += `<div class="name-card p-3 rounded-xl flex justify-between items-center text-[10px] font-bold text-white uppercase tracking-tighter"><span>${i+1}. ${name}</span><i class="fas fa-check-circle text-[#d4af37]"></i></div>`);
        }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function filterSurahs() { const q = document.getElementById('search-input').value.toLowerCase(); renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q))); }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }

        init();
    </script>
</body>
