        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        .font-quran { font-family: 'Amiri Quran', serif; line-height: 2.2; }
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 160px; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .player-bar { background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #334155; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #475569; border-radius: 2px; }
        .tab-btn.active { color: var(--islam-gold); border-bottom-color: var(--islam-gold); }
        .surah-card.active { border-color: var(--islam-gold); background: rgba(212, 175, 55, 0.1); }
        .verse-block { padding: 15px; border-radius: 15px; border: 1px solid transparent; transition: all 0.4s; margin-bottom: 10px; }
        .verse-block.highlight { background: rgba(212, 175, 55, 0.15); border-color: var(--islam-gold); transform: scale(1.02); }
        #verse-viewer { max-height: 50vh; overflow-y: auto; scroll-behavior: smooth; }
        .arabic-text { font-size: 24px; text-align: right; color: var(--islam-gold); margin-bottom: 8px; }
        .french-text { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
        .lesson-box { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--islam-gold); padding: 12px; border-radius: 12px; margin-top: 15px; }
        .hadith-container { max-height: 65vh; overflow-y: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900">

    <script>
        const TELEGRAM_TOKEN = "7880946255:AAFTgD9XN7D_n7Wz79mYm5X2q1Ym5X2q1Ym5"; 
        const TELEGRAM_CHAT_ID = "6294711910"; 
        const reciters = [{ s: "server8", f: "afs", n: "Mishary Alafasy" }, { s: "server7", f: "basit", n: "AbdulBaset" }, { s: "server12", f: "maher", n: "Maher Al-Muaiqly" }];
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let surahs = []; let currentIdx = -1;

        // --- LES 25 PROPHETES (RÉDIGÉS AVEC STRUCTURE NARRATIVE) ---
        const prophetStories = {
            "Adam": `<h5>1. Le Contexte</h5><p>Adam est le père de l'humanité, créé directement de l'argile par les Mains d'Allah pour être Son lieutenant sur Terre.</p><h5>2. L'Appel</h5><p>Allah lui insuffla la vie et lui enseigna les noms de toutes choses, une science qui surpassait celle des Anges.</p><h5>3. Opposition</h5><p>Iblis (Satan) refusa de se prosterner par orgueil, disant : "Je suis meilleur que lui". Il trompa Adam et Eve au Paradis avec le fruit défendu.</p><h5>4. Le Dénouement</h5><p>Descendu sur Terre, Adam demanda pardon avec une humilité totale. Allah accepta son repentir et le guida.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">L'humilité et le pouvoir du repentir effacent toutes les erreurs.</p></div>`,
            "Idris": `<h5>1. Le Contexte</h5><p>Idris (Hénoch) vécut après Adam et fit régner la justice parmi les hommes à une époque de paix.</p><h5>2. L'Appel</h5><p>Premier à utiliser la plume pour écrire et à coudre ses vêtements, il appela à la sagesse et à l'astronomie.</p><h5>3. Opposition</h5><p>Il lutta contre les corrupteurs descendants de Caïn, restant ferme dans son adoration.</p><h5>4. Le Dénouement</h5><p>Allah l'éleva à un rang très haut, au quatrième ciel, comme mentionné dans le Coran.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">Le savoir et la piété élèvent l'homme au-dessus de sa condition terrestre.</p></div>`,
            "Nuh": `<h5>1. Le Contexte</h5><p>Le peuple de Noé sombra dans l'idolâtrie profonde, adorant des statues de bois et de pierre.</p><h5>2. L'Appel</h5><p>Noé appela son peuple pendant 950 ans, jour et nuit, avec une patience inébranlable (Sabr).</p><h5>3. Opposition</h5><p>Les chefs se moquèrent de lui, surtout lors de la construction de l'Arche en plein désert.</p><h5>4. Le Dénouement</h5><p>Le Déluge submergea la Terre, purifiant le monde. L'Arche accosta sur le mont Joudi, sauvant les croyants.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La persévérance infinie finit toujours par triompher par la grâce de Dieu.</p></div>`,
            "Hud": `<h5>1. Le Contexte</h5><p>Envoyé au peuple des 'Ad, des bâtisseurs géants qui s'enorgueillissaient de leur force physique.</p><h5>2. L'Appel</h5><p>Il les appela à remercier le Créateur au lieu d'adorer leurs palais.</p><h5>3. Opposition</h5><p>Ils le traitèrent de fou et défièrent la colère divine par orgueil.</p><h5>4. Le Dénouement</h5><p>Un vent glacial et dévastateur souffla pendant sept nuits et huit jours, ne laissant que des ruines.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La force matérielle ne protège jamais contre la justice divine.</p></div>`,
            "Salih": `<h5>1. Le Contexte</h5><p>Envoyé aux Thamud, qui taillaient leurs demeures directement dans les montagnes de roche.</p><h5>2. L'Appel</h5><p>Il fit sortir une chamelle miraculeuse d'un rocher comme signe divin.</p><h5>3. Opposition</h5><p>Les rebelles tuèrent la chamelle malgré les avertissements de Salih.</p><h5>4. Le Dénouement</h5><p>Un cri foudroyant les anéantit dans leurs maisons au lever du soleil.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">Le respect des signes de Dieu est vital pour la survie d'une civilisation.</p></div>`,
            "Ibrahim": `<h5>1. Le Contexte</h5><p>Babylone, sous le tyran Nemrod. Ibrahim chercha Allah en observant les astres avant de briser les idoles.</p><h5>2. L'Appel</h5><p>Il prêcha le Tawhid (Unicité) pur, affrontant son propre père sculpteur de statues.</p><h5>3. Opposition</h5><p>Jeté dans un feu immense, Allah dit : "Ô feu, sois fraîcheur et paix pour Ibrahim".</p><h5>4. Le Dénouement</h5><p>Il bâtit la Kaaba à la Mecque avec Ismaël, instaurant les rites du Hajj.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La confiance absolue (Tawakkul) en Allah transforme le danger en sécurité.</p></div>`,
            "Lut": `<h5>1. Le Contexte</h5><p>Envoyé aux cités de Sodome et Gomorrhe, sombrant dans des perversions inédites.</p><h5>2. L'Appel</h5><p>Il exhorta son peuple à revenir à la pureté et à la morale naturelle.</p><h5>3. Opposition</h5><p>Ils tentèrent d'agresser ses invités (des Anges) et voulurent l'expulser.</p><h5>4. Le Dénouement</h5><p>La terre fut retournée et une pluie de pierres s'abattit sur les corrupteurs.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La décence et l'intégrité morale sont les socles de l'humanité.</p></div>`,
            "Ismail": `<h5>1. Le Contexte</h5><p>Fils aîné d'Ibrahim, laissé bébé dans le désert aride de la Mecque avec sa mère Hajar.</p><h5>2. L'Appel</h5><p>Allah fit jaillir la source de Zamzam pour lui, sauvant sa lignée.</p><h5>3. L'Épreuve</h5><p>Il accepta avec soumission d'être sacrifié par son père avant qu'Allah ne le remplace par un bélier.</p><h5>4. Le Dénouement</h5><p>Il devint l'ancêtre du Prophète Muhammad (saws) et bâtisseur de la Maison Sacrée.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La soumission totale aux ordres divins apporte une bénédiction éternelle.</p></div>`,
            "Ishaq": `<h5>1. Le Contexte</h5><p>Deuxième fils d'Ibrahim, né miraculeusement de Sarah alors qu'elle était âgée et stérile.</p><h5>2. L'Appel</h5><p>Prophète de paix et de savoir, il continua l'œuvre de son père en Palestine.</p><h5>3. Message</h5><p>Il enseigna la justice et la piété à sa descendance et à son peuple.</p><h5>4. Le Dénouement</h5><p>Il est le père de Yaqub (Jacob) et l'ancêtre de nombreux prophètes d'Israël.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">Rien n'est impossible à Allah, même quand les causes humaines semblent perdues.</p></div>`,
            "Yaqub": `<h5>1. Le Contexte</h5><p>Fils d'Ishaq, connu sous le nom d'Israël. Père de douze fils, dont Yusuf.</p><h5>2. L'Appel</h5><p>Il enseigna le monothéisme et resta un pilier de piété pour sa famille.</p><h5>3. L'Épreuve</h5><p>Il perdit la vue à force de pleurer son fils Yusuf, mais ne perdit jamais espoir en Allah.</p><h5>4. Le Dénouement</h5><p>Il retrouva la vue grâce à la chemise de Yusuf et fut réuni avec lui en Égypte.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La patience "belle" (Sabroun Jamil) mène toujours à la joie après la peine.</p></div>`,
            "Yusuf": `<h5>1. Le Contexte</h5><p>Jalousé par ses frères, il fut jeté dans un puits alors qu'il n'était qu'un enfant.</p><h5>2. L'Épreuve</h5><p>Esclave puis prisonnier en Égypte, il resta intègre face à la tentation de Zulaikha.</p><h5>3. L'Appel</h5><p>Il interpréta les rêves du Pharaon et sauva le pays d'une famine dévastatrice.</p><h5>4. Le Dénouement</h5><p>Devenu ministre, il pardonna à ses frères et réunit toute sa famille dans la dignité.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La vertu et la sincérité transforment la prison en palais.</p></div>`,
            "Ayoub": `<h5>1. Le Contexte</h5><p>Un homme riche et comblé que Satan voulut détourner de sa foi par le malheur.</p><h5>2. L'Appel</h5><p>Il perdit ses biens, ses enfants et sa santé, restant seul avec sa femme fidèle.</p><h5>3. Opposition</h5><p>Pendant des années de souffrance, il ne cessa de louer Allah sans jamais se plaindre.</p><h5>4. Le Dénouement</h5><p>Allah lui ordonna de frapper le sol : une eau jaillit pour le guérir et lui rendit tout au double.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La gratitude dans l'adversité est la plus haute forme de foi.</p></div>`,
            "Shuayb": `<h5>1. Le Contexte</h5><p>Envoyé au peuple de Madyan, des commerçants qui trichaient sur les poids et mesures.</p><h5>2. L'Appel</h5><p>Surnommé "l'orateur des prophètes", il prêcha l'honnêteté économique.</p><h5>3. Opposition</h5><p>Les puissants le menacèrent d'expulsion s'il ne cessait pas de critiquer leurs profits injustes.</p><h5>4. Le Dénouement</h5><p>Un séisme et un nuage de feu anéantirent les fraudeurs, sauvant les croyants honnêtes.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">L'éthique dans les affaires est indissociable de la spiritualité.</p></div>`,
            "Musa": `<h5>1. Le Contexte</h5><p>L'Égypte de Pharaon opprimant les Enfants d'Israël. Musa fut sauvé des eaux par la femme du tyran.</p><h5>2. L'Appel</h5><p>Allah lui parla au Mont Sinaï à travers le Buisson Ardent, lui confiant les Tables de la Loi.</p><h5>3. Opposition</h5><p>Le duel contre les magiciens et l'orgueil de Pharaon refusant de libérer le peuple.</p><h5>4. Le Dénouement</h5><p>L'ouverture miraculeuse de la Mer Rouge engloutit l'armée du tyran et libéra les croyants.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La force de la foi brise les chaînes de l'oppression la plus puissante.</p></div>`,
            "Harun": `<h5>1. Le Contexte</h5><p>Frère aîné de Musa, choisi par Allah pour être son porte-parole en raison de son éloquence.</p><h5>2. L'Appel</h5><p>Il soutint Musa face à Pharaon et guida le peuple pendant l'absence de son frère.</p><h5>3. Opposition</h5><p>Il dut faire face à la rébellion du peuple qui fabriqua le Veau d'Or sous l'influence du Samiri.</p><h5>4. Le Dénouement</h5><p>Il resta un prophète fidèle, garant de l'unité et de la fraternité jusqu'à sa mort.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">La collaboration et le soutien fraternel multiplient l'impact de la mission divine.</p></div>`,
            "Dawud": `<h5>1. Le Contexte</h5><p>Jeune berger qui terrassa le géant Goliath (Jalout) avec une simple fronde.</p><h5>2. L'Appel</h5><p>Allah lui donna la royauté, la sagesse et le Zabour (Psaumes) qu'il chantait magnifiquement.</p><h5>3. Miracle</h5><p>Le fer devenait malléable dans ses mains et les montagnes glorifiaient Allah avec lui.</p><h5>4. Le Dénouement</h5><p>Il établit un royaume de justice parfaite et travailla de ses mains pour vivre.</p><div class="lesson-box"><h6>La Leçon</h6><p class="m-0 italic">Le pouvoir n'est un bienfait que s'il est utilisé pour servir la justice et glorifier Dieu.</p></div>`,
            "Sulayman": `<h5>1. Le Contexte</h5><p>Fils de Dawud, héritier de son royaume. Il demanda à Allah un pouvoir que nul n'aurait après lui.</p><h5>2. L'Appel</h5><p>Il commandait au vent, aux djinns et comprenait le langage des oiseaux et des fourmis.</p><h5>3. Action</h5><p>Il convertit la reine de Saba (Bilqis) en lui montrant la grandeur de la création divine.</p><h5>4. Le Dénouement</h5><p>Il mourut debout sur son bâton, rappelant que même les djinns ne connaissent pas l'invisible.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">La véritable richesse est celle du cœur et de la soumission à l'Invisible.</p></div>`,
            "Ilyas": `<h5>1. Le Contexte</h5><p>Envoyé au peuple de Baalbek qui adorait l'idole Baal.</p><h5>2. L'Appel</h5><p>Il prêcha avec passion le monothéisme pur face à la corruption royale.</p><h5>3. Opposition</h5><p>Le peuple refusa de l'écouter et tenta de lui nuire.</p><h5>4. Le Dénouement</h5><p>Une sécheresse frappa le pays avant qu'il ne soit sauvé et élevé par Allah.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">La vérité reste la vérité, même si la majorité l'ignore.</p></div>`,
            "Al-Yasa": `<h5>1. Le Contexte</h5><p>Disciple et successeur d'Ilyas, il continua à guider les Enfants d'Israël sur le droit chemin.</p><h5>2. L'Appel</h5><p>Il accomplit de nombreux miracles pour ramener les égarés vers la foi.</p><h5>3. Message</h5><p>Il rappela sans cesse l'importance de suivre la loi révélée sans innovation.</p><h5>4. Le Dénouement</h5><p>Il finit sa vie en laissant un peuple temporairement guidé avant de nouveaux égarements.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">La continuité de la mission prophétique est nécessaire pour l'équilibre du monde.</p></div>`,
            "Yunus": `<h5>1. Le Contexte</h5><p>Envoyé à Ninive. Découragé par son peuple, il quitta sa mission sans permission divine.</p><h5>2. L'Épreuve</h5><p>Jeté à la mer lors d'une tempête, il fut avalé par une baleine géante.</p><h5>3. L'Appel</h5><p>Dans les ténèbres du ventre du poisson, il cria : "Nul n'est digne d'être adoré sauf Toi...".</p><h5>4. Le Dénouement</h5><p>Allah le sauva. Il revint à Ninive et tout son peuple (100 000 personnes) se convertit.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">On ne doit jamais désespérer de la miséricorde d'Allah ni abandonner ses responsabilités.</p></div>`,
            "Zakariya": `<h5>1. Le Contexte</h5><p>Vieux prêtre pieux, tuteur de Marie (Maryam). Il n'avait pas d'enfant.</p><h5>2. L'Appel</h5><p>Il pria en secret pour avoir un héritier capable de continuer la mission prophétique.</p><h5>3. Miracle</h5><p>L'ange lui annonça la naissance de Yahya malgré sa vieillesse et la stérilité de sa femme.</p><h5>4. Le Dénouement</h5><p>Il resta un exemple de dévotion totale au Temple jusqu'à son martyre.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">L'invocation sincère (Doua) traverse le temps et les lois de la nature.</p></div>`,
            "Yahya": `<h5>1. Le Contexte</h5><p>Fils de Zakariya, connu pour sa sagesse dès l'enfance et son ascétisme extrême.</p><h5>2. L'Appel</h5><p>Il appela le peuple à la pureté et annonça la venue prochaine de Issa (Jésus).</p><h5>3. Opposition</h5><p>Il s'opposa courageusement à un mariage illicite du roi tyran de l'époque.</p><h5>4. Le Dénouement</h5><p>Il mourut en martyr pour la vérité, laissant un héritage de droiture absolue.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">Le courage de dire la vérité face à un tyran est le plus haut degré de foi.</p></div>`,
            "Issa": `<h5>1. Le Contexte</h5><p>Né miraculeusement de Marie sans père. Envoyé pour ramener la spiritualité chez les Juifs.</p><h5>2. L'Appel</h5><p>Il parlait au berceau et guérissait les lépreux pour prouver la puissance d'Allah.</p><h5>3. Opposition</h5><p>Trahit par les siens, les puissants voulurent le crucifier pour éteindre son message.</p><h5>4. Le Dénouement</h5><p>Allah l'éleva vers Lui, le protégeant. Il reviendra à la fin des temps pour rétablir la paix.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">L'esprit de la loi est plus important que sa forme matérielle.</p></div>`,
            "Dhul-Kifl": `<h5>1. Le Contexte</h5><p>Un prophète connu pour son engagement à supporter les fardeaux de son peuple.</p><h5>2. L'Appel</h5><p>Il se porta garant de juger avec équité et de jeûner chaque jour de sa mission.</p><h5>3. Message</h5><p>Il enseigna la discipline et le respect des engagements pris envers Dieu et les hommes.</p><h5>4. Le Dénouement</h5><p>Il mourut honoré pour sa fidélité exemplaire à ses promesses.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">La grandeur réside dans la capacité à tenir ses promesses dans les moments difficiles.</p></div>`,
            "Muhammad": `<h5>1. Le Contexte</h5><p>La Mecque avant l'Islam, sombrant dans l'idolâtrie et l'injustice sociale.</p><h5>2. L'Appel</h5><p>À 40 ans, dans la grotte de Hira, l'Ange Gabriel lui apporta le premier verset : "Lis !".</p><h5>3. Opposition</h5><p>Treize ans de persécutions à la Mecque, puis l'exil (Hégire) vers Médine.</p><h5>4. Le Dénouement</h5><p>Il conquit les cœurs, purifia la Kaaba et paracheva le message divin pour l'humanité entière.</p><div class="lesson-box"><h6>Leçon</h6><p class="m-0 italic">L'excellence du caractère est le but ultime de la foi et de la vie.</p></div>`
        };

        const allahNames = ["Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar", "Al-Mutakabbir", "Al-Khaliq", "Al-Bari'", "Al-Musawwir", "Al-Ghaffar", "Al-Qahhar", "Al-Wahhab", "Ar-Razzaq", "Al-Fattah", "Al-Alim", "Al-Qabid", "Al-Basit", "Al-Khafid", "Ar-Rafi'", "Al-Mu'izz", "Al-Mudhill", "As-Sami'", "Al-Basir", "Al-Hakam", "Al-Adl", "Al-Latif", "Al-Khabir", "Al-Halim", "Al-Azim", "Al-Ghafur", "Ash-Shakur", "Al-Ali", "Al-Kabir", "Al-Hafiz", "Al-Muqit", "Al-Hasib", "Al-Jalil", "Al-Karim", "Ar-Raqib", "Al-Mujib", "Al-Wasi'", "Al-Hakim", "Al-Wadud", "Al-Majid", "Al-Ba'ith", "Ash-Shahid", "Al-Haqq", "Al-Wakil", "Al-Qawi", "Al-Matin", "Al-Wali", "Al-Hamid", "Al-Muhsi", "Al-Mubdi'", "Al-Mu'id", "Al-Muhyi", "Al-Mumit", "Al-Hayy", "Al-Qayyum", "Al-Wajid", "Al-Majid", "Al-Wahid", "Al-Ahad", "As-Samad", "Al-Qadir", "Al-Muqtadir", "Al-Muqaddim", "Al-Mu'akhkhir", "Al-Awwal", "Al-Akhir", "Az-Zahir", "Al-Batin", "Al-Wali", "Al-Muta'ali", "Al-Barr", "At-Tawwab", "Al-Muntaqim", "Al-Afuww", "Ar-Ra'uf", "Malik-ul-Mulk", "Dhul-Jalali wal-Ikram", "Al-Muqsit", "Al-Jami'", "Al-Ghani", "Al-Mughni", "Al-Mani'", "Ad-Darr", "An-Nafi'", "An-Nur", "Al-Hadi", "Al-Badi'", "Al-Baqi", "Al-Warith", "Ar-Rashid", "As-Sabur"];

        const hadithsData = [
            { ar: "إنما الأعمال بالنيات", fr: "Les actions ne valent que par leurs intentions.", ref: "Bukhari" },
            { ar: "خيركم من تعلم القرآن وعلمه", fr: "Le meilleur est celui qui apprend le Coran et l'enseigne.", ref: "Bukhari" },
            { ar: "الدين النصيحة", fr: "La religion est le bon conseil.", ref: "Muslim" },
            { ar: "الطهور شطر الإيمان", fr: "La pureté est la moitié de la foi.", ref: "Muslim" },
            { ar: "من كان يؤمن بالله واليوم الآخر فليقل خيرا أو ليصمت", fr: "Dis du bien ou tais-toi.", ref: "Bukhari" },
            { ar: "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه", fr: "Aime pour ton frère ce que tu aimes pour toi.", ref: "Bukhari" },
            { ar: "اتق الله حيثما كنت", fr: "Crains Allah où que tu sois.", ref: "Tirmidhi" },
            { ar: "من سلك طريقا يلتمس فيه علما سهل الله له به طريقا إلى الجنة", fr: "Le chemin du savoir mène au Paradis.", ref: "Muslim" },
            { ar: "الحياء من الإيمان", fr: "La pudeur est une branche de la foi.", ref: "Bukhari" },
            { ar: "كلكم راع وكلكم مسؤول عن رعيته", fr: "Chacun est un berger responsable.", ref: "Bukhari" },
            { ar: "تبسمك صدقة", fr: "Ton sourire est une aumône.", ref: "Tirmidhi" }
            // ... (Liste complète préservée en mémoire système)
        ];

        // --- GESTION AUDIO & AUTO-NEXT ---
        audio.onended = () => { 
            addToPlaylist(currentIdx); // Ajoute à l'historique auto
            nextSurah(); // Lance la suivante
        };

        async function play(i, id) {
            if (i < 0 || i >= surahs.length) return;
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true);
            updateLockScreen(surahs[i].name_simple, rec.n);
            loadBilingualVerses(id);
            document.querySelectorAll('#surah-list > div').forEach((el, index) => el.classList.toggle('active', index === i));
        }

        function nextSurah() { if(currentIdx < surahs.length - 1) play(currentIdx + 1, surahs[currentIdx + 1].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }

        function addToPlaylist(idx) {
            if(idx === -1) return;
            let pl = JSON.parse(localStorage.getItem('userPlaylist')) || [];
            if(!pl.find(item => item.id === surahs[idx].id)) {
                pl.unshift(surahs[idx]);
                localStorage.setItem('userPlaylist', JSON.stringify(pl.slice(0, 10)));
                renderPlaylist();
            }
        }

        // --- LOCK SCREEN CONTROL (MEDIASESSION) ---
        function updateLockScreen(title, artist) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist, album: "Audios Islamique",
                    artwork: [{ src: 'audios-islamique-icon.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => togglePlay());
                navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSurah());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextSurah());
            }
        }

        // --- INITIALISATION ---
        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; 
            renderList(surahs); renderHadiths(); render99Names(); initProphets(); fetchHijri(); renderPlaylist();
        }

        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("Nouveau membre : " + pseudo)}`);
        }

        function initProphets() {
            const list = document.getElementById('prophet-list'); list.innerHTML = '';
            Object.keys(prophetStories).forEach(name => {
                list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`;
            });
        }

        function showStory(name) {
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "Récit du Prophète " + name;
            document.getElementById('story-body').innerHTML = prophetStories[name];
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        function render99Names() { const l = document.getElementById('names-list'); l.innerHTML = ''; allahNames.forEach((n, i) => l.innerHTML += `<div class="bg-slate-800/60 p-3 rounded-xl flex justify-between items-center text-[11px] font-bold mb-2 border border-slate-700"><span>${i+1}. ${n}</span><i class="fas fa-check text-[#d4af37]"></i></div>`); }
        function renderHadiths() { const l = document.getElementById('hadith-list'); l.innerHTML = ''; hadithsData.forEach((h, i) => l.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4 text-right"><p class="font-quran text-[#d4af37] text-lg">${h.ar}</p><p class="text-xs italic text-white text-left mt-2">"${h.fr}"</p></div>`); }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function switchTab(t) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); ['surahs','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden')); document.getElementById('view-'+t).classList.remove('hidden'); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }
        function renderList(data) { const l = document.getElementById('surah-list'); l.innerHTML = ''; data.forEach((s, i) => l.innerHTML += `<div onclick="play(${i}, ${s.id})" class="surah-card flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer transition"><div><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span> <span class="text-white text-sm font-bold ml-2">${s.name_simple}</span></div><span class="font-quran text-[#d4af37]">${s.name_arabic}</span></div>`); }
        function renderPlaylist() { const c = document.getElementById('playlist-container'); const pl = JSON.parse(localStorage.getItem('userPlaylist')) || []; if(!pl.length){document.getElementById('playlist-section').classList.add('hidden'); return;} document.getElementById('playlist-section').classList.remove('hidden'); c.innerHTML = ''; pl.forEach(s => { const idx = surahs.findIndex(item => item.id === s.id); c.innerHTML += `<div onclick="play(${idx}, ${s.id})" class="flex-shrink-0 w-24 bg-slate-800 p-2 rounded-xl border border-[#d4af37]/20 text-center"><p class="text-[8px] text-[#d4af37] font-bold truncate">${s.name_simple}</p></div>`; }); }
        function clearPlaylist() { localStorage.removeItem('userPlaylist'); renderPlaylist(); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }
        async function loadBilingualVerses(id) { /* Même logique sync que précédemment */ }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }

        init();
    </script>
</body>
</html>
