            { ar: "لا يدخل الجنة من كان في قلبه مثقال ذرة من كبر", fr: "N'entrera pas au Paradis celui qui a dans son cœur le poids d'un atome d'orgueil.", ref: "Muslim" },
            { ar: "المسلم من سلم المسلمون من لسانه ويده", fr: "Le Musulman est celui dont les Musulmans sont à l'abri de sa langue et de sa main.", ref: "Bukhari" },
            { ar: "من دل على خير فله مثل أجر فاعله", fr: "Celui qui montre un bien a la même récompense que celui qui l'a fait.", ref: "Muslim" },
            { ar: "من نفس عن مؤمن كربة من كرب الدنيا نفس الله عنه كربة من كرب يوم القيامة", fr: "Celui qui soulage un croyant d'une peine de ce monde, Allah le soulagera d'une peine le Jour de la Résurrection.", ref: "Muslim" },
            { ar: "الله في عون العبد ما كان العبد في عون أخيه", fr: "Allah aide le serviteur tant que le serviteur aide son frère.", ref: "Muslim" },

            { ar: "إن الله لا ينظر إلى صوركم وأموالكم ولكن ينظر إلى قلوبكم وأعمالكم", fr: "Allah ne regarde pas vos formes ni vos richesses, mais Il regarde vos cœurs et vos actes.", ref: "Muslim" },
            { ar: "من بنى لله مسجدا ولو كمفحص قطاة بنى الله له بيتا في الجنة", fr: "Celui qui construit pour Allah une mosquée, même petite, Allah lui construit une maison au Paradis.", ref: "Ibn Majah" },

            { ar: "سبحان الله وبحمده سبحان الله العظيم", fr: "Gloire et louange à Allah, Gloire à Allah l'Immense.", ref: "Bukhari" },

            { ar: "يسروا ولا تعسروا", fr: "Facilitez et ne rendez pas difficile.", ref: "Bukhari" },
            { ar: "لا تباغضوا ولا تحاسدوا", fr: "Ne vous détestez pas et ne vous enviez pas.", ref: "Bukhari" },

            { ar: "من يضمن لي ما بين لحييه وما بين رجليه أضمن له الجنة", fr: "Celui qui me garantit ce qu'il a entre ses mâchoires (la langue) et entre ses jambes (le sexe), je lui garantis le Paradis.", ref: "Bukhari" },

            { ar: "ما زال جبريل يوصيني بالجار حتى ظننت أنه سيورثه", fr: "L'ange Gabriel n'a cessé de me recommander le voisin au point que j'ai cru qu'il allait lui donner droit à l'héritage.", ref: "Bukhari" },
            { ar: "اتقوا دعوة المظلوم", fr: "Craignez l'invocation de l'opprimé.", ref: "Bukhari" },

            { ar: "الظلم ظلمات يوم القيامة", fr: "L'injustice sera ténèbres le Jour de la Résurrection.", ref: "Bukhari" },
            { ar: "من صلى البردين دخل الجنة", fr: "Celui qui prie les deux fraîcheurs (l'Aube et l'Après-midi) entrera au Paradis.", ref: "Bukhari" },
            { ar: "أفضل الصلاة بعد الفريضة صلاة الليل", fr: "La meilleure prière après l'obligatoire est la prière de nuit.", ref: "Muslim" },
            { ar: "لولا أن أشق على أمتي لأمرتهم بالسواك عند كل صلاة", fr: "Si je ne craignais pas de surcharger ma communauté, je leur aurais ordonné le siwak avant chaque prière.", ref: "Bukhari" },
            { ar: "خير الناس أنفعهم للناس", fr: "Le meilleur des hommes est le plus utile aux autres.", ref: "Daraqutni" },
            { ar: "من قرأ حرفا من كتاب الله فله به حسنة", fr: "Celui qui lit une lettre du Livre d'Allah a une bonne action.", ref: "Tirmidhi" },
            { ar: "الدنيا متاع وخير متاع الدنيا المرأة الصالحة", fr: "Le monde est une jouissance et la meilleure jouissance est la femme pieuse.", ref: "Muslim" }
        ];

        audio.onended = () => { 
            if(currentIdx !== -1) {
                addToPlaylist(currentIdx);
                nextSurah(); 
            }
        };

        async function play(i, id) {
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); 
            updateBtn(true);
            loadBilingualVerses(id);
            document.querySelectorAll('#surah-list > div').forEach((el, index) => el.classList.toggle('active', index === i));
        }

        function addToPlaylist(idx) {
            let list = JSON.parse(localStorage.getItem('userPlaylist') || '[]');
            if(!list.includes(idx)) {
                list.unshift(idx);
                if(list.length > 10) list.pop();
                localStorage.setItem('userPlaylist', JSON.stringify(list));
                renderPlaylist();
            }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            const list = JSON.parse(localStorage.getItem('userPlaylist') || '[]');
            container.innerHTML = '';
            list.forEach(idx => {
                if(surahs[idx]) {
                    container.innerHTML += `<div onclick="play(${idx}, ${surahs[idx].id})" class="bg-[#d4af37]/20 border border-[#d4af37]/40 px-3 py-2 rounded-xl text-[10px] text-white font-bold whitespace-nowrap cursor-pointer">${surahs[idx].name_simple}</div>`;
                }
            });
        }

        async function loadBilingualVerses(chapterId) {
            const viewer = document.getElementById('verse-viewer');
            document.getElementById('sync-container').classList.remove('hidden');
            viewer.innerHTML = '<p class="text-center animate-pulse py-4">Synchronisation...</p>';
            try {
                const resAr = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${chapterId}`);
                const dataAr = await resAr.json();
                const resFr = await fetch(`https://api.quran.com/api/v4/quran/translations/31?chapter_number=${chapterId}`);
                const dataFr = await resFr.json();
                viewer.innerHTML = '';
                dataAr.verses.forEach((v, index) => {
                    const block = document.createElement('div');
                    block.className = 'verse-block';
                    block.id = `verse-${index}`;
                    block.innerHTML = `<div class="arabic-text font-quran">${v.text_uthmani}</div><div class="french-text">${dataFr.translations[index].text}</div>`;
                    viewer.appendChild(block);
                });
            } catch (e) { viewer.innerHTML = 'Erreur réseau.'; }
        }

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const progress = audio.currentTime / audio.duration;
            const blocks = document.querySelectorAll('.verse-block');
            if (blocks.length === 0) return;
            const activeIdx = Math.floor(progress * blocks.length);
            blocks.forEach((v, idx) => {
                if(idx === activeIdx) {
                    v.classList.add('highlight');
                    v.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else v.classList.remove('highlight');
            });
            document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            document.getElementById('time-total').innerText = formatTime(audio.duration);
        };

        function formatTime(s) { if(!s) return "0:00"; let m = Math.floor(s/60); let sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json(); 
                surahs = data.chapters; 
                renderList(surahs); 
            } catch(e) {}
            renderHadiths(); render99Names(); initProphets(); fetchHijri(); renderPlaylist();
        }

        function initProphets() {
            const list = document.getElementById('prophet-list'); list.innerHTML = '';
            Object.keys(prophetsData).forEach(name => {
                list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`;
            });
        }

        function showStory(name) {
            const p = prophetsData[name];
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "PROPHÈTE " + name.toUpperCase();
            document.getElementById('story-body').innerHTML = `
                <h5>1. Contexte</h5><p>${p.context}</p>
                <h5>2. L'Appel</h5><p>${p.appeal}</p>
                <h5>3. Message et Miracle</h5><p><strong>Signe :</strong> ${p.miracle}. <br>${p.message}</p>
                <h5>4. Dénouement</h5><p>${p.end}</p>
                <div class='lesson-box'><h6>Thème : ${p.theme}</h6><p class='m-0 italic'>Leçon : ${p.lesson}</p></div>
            `;
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("Nouveau membre : " + pseudo)}`);
        }
        function render99Names() {
            const list = document.getElementById('names-list'); list.innerHTML = '';
            allahNames.forEach((name, i) => list.innerHTML += `<div class="bg-slate-800/60 p-3 rounded-xl flex justify-between items-center text-[11px] font-bold text-white mb-2 border border-slate-700"><span>${i+1}. ${name}</span><i class="fas fa-check text-[#d4af37]"></i></div>`);
        }
        function renderHadiths() {
            const list = document.getElementById('hadith-list'); list.innerHTML = '';
            hadithsData.forEach((item, index) => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4"><div class="flex justify-between items-start mb-2"><span class="text-[8px] bg-[#d4af37] text-slate-900 px-2 py-0.5 rounded-full font-bold">#${index+1}</span><p class="text-right font-quran text-[#d4af37] text-lg" dir="rtl">${item.ar}</p></div><p class="text-xs italic text-white mt-2">"${item.fr}"</p></div>`;
            });
        }
        function closeSync() { document.getElementById('sync-container').classList.add('hidden'); }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function filterSurahs() { const q = document.getElementById('search-input').value.toLowerCase(); renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q))); }
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
        }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }
        function nextSurah() { if(currentIdx < surahs.length - 1) play(currentIdx + 1, surahs[currentIdx + 1].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
        function renderList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach((s, i) => list.innerHTML += `<div onclick="play(${i}, ${s.id})" class="surah-card flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition"><div class="flex items-center gap-4"><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span><span class="text-white text-sm font-bold">${s.name_simple}</span></div><span class="text-lg font-quran text-[#d4af37]">${s.name_arabic}</span></div>`);
        }
        function clearPlaylist() { localStorage.removeItem('userPlaylist'); renderPlaylist(); }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }
        function requestNotificationPermission() { Notification.requestPermission(); }

        init();
    </script>
</body>
