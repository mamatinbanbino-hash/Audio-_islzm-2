        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }

        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--islam-gold); cursor: pointer; margin-top: -5px; }

        .hadith-container { max-height: 65vh; overflow-y: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

            { ar: "الحياء كله خير", fr: "La pudeur n'apporte que du bien.", ref: "Muslim" },
            { ar: "أفضل الذكر لا إله إلا الله", fr: "Le meilleur rappel est 'Il n'y a de divinité qu'Allah'.", ref: "Tirmidhi" },
            { ar: "كل معروف صدقة", fr: "Chaque bonne action est une aumône.", ref: "Bukhari" },
            { ar: "إن الصدق يهدي إلى البر", fr: "La vérité mène à la piété.", ref: "Bukhari" },
            { ar: "المرء مع من أحب", fr: "L'homme sera avec ceux qu'il a aimés.", ref: "Bukhari" },
            { ar: "الدين يسر", fr: "La religion est aisance.", ref: "Bukhari" },
            { ar: "اتقوا دعوة المظلوم", fr: "Craignez l'invocation de l'opprimé.", ref: "Bukhari" },
            { ar: "لا ضرر ولا ضرار", fr: "Il ne faut pas causer de tort, ni répondre à un tort par un tort.", ref: "Ibn Majah" },
            { ar: "بروا آباءكم تبركم أبناؤكم", fr: "Soyez bons envers vos parents, vos enfants le seront envers vous.", ref: "Tabarani" },
            { ar: "خيركم خيركم لأهله", fr: "Le meilleur d'entre vous est celui qui est le meilleur envers sa famille.", ref: "Tirmidhi" },
            { ar: "من سلك طريقا يلتمس فيه علما سهل الله له به طريقا إلى الجنة", fr: "Celui qui emprunte un chemin pour la science, Allah lui facilite le Paradis.", ref: "Muslim" },
            { ar: "البشرى للمشائين في الظلم إلى المساجد", fr: "Annonce la lumière complète à ceux qui marchent vers les mosquées dans l'obscurité.", ref: "Abu Daoud" },
            { ar: "من غدا إلى المسجد أو راح أعد الله له نزلا في الجنة", fr: "Celui qui va à la mosquée, Allah lui prépare un séjour au Paradis.", ref: "Bukhari" },
            { ar: "كل مسكر حرام", fr: "Tout ce qui enivre est interdit.", ref: "Muslim" },
            { ar: "طلب العلم فريضة على كل مسلم", fr: "La recherche de la science est une obligation pour chaque musulman.", ref: "Ibn Majah" },
            { ar: "من بنى لله مسجدا بنى الله له بيتا في الجنة", fr: "Celui qui construit une mosquée, Allah lui construit une maison au Paradis.", ref: "Muslim" },
            { ar: "لا تشد الرحال إلا إلى ثلاثة مساجد", fr: "On ne prépare de voyage que vers trois mosquées sacrées.", ref: "Bukhari" },
            { ar: "الصدقة برهان", fr: "L'aumône est une preuve de foi.", ref: "Muslim" },
            { ar: "من يضمن لي ما بين لحييه أضمن له الجنة", fr: "Celui qui garantit sa langue, je lui garantis le Paradis.", ref: "Bukhari" },
            { ar: "من كان في حاجة أخيه كان الله في حاجته", fr: "Celui qui aide son frère, Allah l'aidera.", ref: "Muslim" },
            { ar: "إن الله يحب إذا عمل أحدكم عملا أن يتقنه", fr: "Allah aime le travail fait avec excellence.", ref: "Tabarani" },
            { ar: "الظلم ظلمات يوم القيامة", fr: "L'injustice sera ténèbres le Jour de la Résurrection.", ref: "Bukhari" },
            { ar: "من عادى لي وليا فقد آذنته بالحرب", fr: "Celui qui prend Mon allié pour ennemi, Je lui déclare la guerre.", ref: "Bukhari" },
            { ar: "من لزم الاستغفار جعل الله له من كل هم فرجا", fr: "Celui qui s'attache au pardon, Allah lui accorde une issue à chaque souci.", ref: "Abu Daoud" },
            { ar: "سبق المفردون", fr: "Les 'moufridoun' (ceux qui invoquent beaucoup) ont devancé les autres.", ref: "Muslim" },
            { ar: "ما قل وكفى خير مما كثر وألهى", fr: "Ce qui est peu et suffit vaut mieux que ce qui est beaucoup et distrait.", ref: "Abu Ya'la" },
            { ar: "الغنى غنى النفس", fr: "La richesse est celle de l'âme.", ref: "Bukhari" },
            { ar: "زر غبا تزدد حبا", fr: "Rendez visite de temps en temps, l'affection augmentera.", ref: "Tabarani" },
            { ar: "تهادوا تحابوا", fr: "Offrez-vous des cadeaux, vous vous aimerez.", ref: "Bukhari" },
            { ar: "نعم المال الصالح للمرء الصالح", fr: "Quel bon bien que l'argent licite pour l'homme vertueux.", ref: "Ahmad" },
            { ar: "من يتصبر يصبره الله", fr: "Celui qui s'efforce d'être patient, Allah l'aidera.", ref: "Bukhari" },
            { ar: "الظلم مرتعه وخيم", fr: "Les conséquences de l'injustice sont funestes.", ref: "Suyuṭi" },
            { ar: "من كتم علما ألجمه الله بلجام من نار", fr: "Celui qui cache une science sera bridé d'un mors de feu.", ref: "Ibn Majah" },
            { ar: "أفضل الجهاد كلمة حق عند سلطان جائر", fr: "Le meilleur Jihad est une vérité devant un tyran.", ref: "Abu Daoud" },
            { ar: "ما ملأ آدمي وعاء شرا من بطن", fr: "L'homme n'a jamais rempli de pire récipient que son ventre.", ref: "Tirmidhi" },
            { ar: "سبعة يظلهم الله في ظله", fr: "Sept catégories de personnes seront sous l'ombre d'Allah.", ref: "Bukhari" },
            { ar: "أقرب ما يكون العبد من ربه وهو ساجد", fr: "Le serviteur est le plus proche de son Seigneur en prosternation.", ref: "Muslim" },
            { ar: "لو توكلتم على الله حق توكله لرزقكم كما يرزق الطير", fr: "Si vous aviez confiance en Allah, Il vous nourrirait comme l'oiseau.", ref: "Tirmidhi" },
            { ar: "من كان يؤمن بالله واليوم الآخر فليكرم ضيفه", fr: "Celui qui croit en Allah, qu'il honore son invité.", ref: "Bukhari" },
            { ar: "الدنيا متاع وخير متاعها المرأة الصالحة", fr: "Le monde est une jouissance, la meilleure est la femme pieuse.", ref: "Muslim" },
            { ar: "إنما بعثت لأتمم مكارم الأخلاق", fr: "Je n'ai été envoyé que pour parfaire les nobles caractères.", ref: "Malik" }
        ];

        // --- GESTION AUDIO & PLAYLIST ---
        audio.onended = () => {
            if(currentIdx !== -1) addToPlaylist(currentIdx);
            nextSurah();
        };

        function addToPlaylist(idx) {
            let pl = JSON.parse(localStorage.getItem('userPlaylist')) || [];
            const s = surahs[idx];
            if(!pl.find(item => item.id === s.id)) {
                pl.unshift(s);
                localStorage.setItem('userPlaylist', JSON.stringify(pl.slice(0, 10)));
                renderPlaylist();
            }
        }

        function renderPlaylist() {
            const sec = document.getElementById('playlist-section');
            const cont = document.getElementById('playlist-container');
            const pl = JSON.parse(localStorage.getItem('userPlaylist')) || [];
            if(pl.length === 0) { sec.classList.add('hidden'); return; }
            sec.classList.remove('hidden');
            cont.innerHTML = '';
            pl.forEach(s => {
                const oIdx = surahs.findIndex(item => item.id === s.id);
                cont.innerHTML += `<div onclick="play(${oIdx}, ${s.id})" class="flex-shrink-0 w-24 bg-slate-800 p-2 rounded-xl border border-[#d4af37]/20 text-center"><p class="text-[8px] text-[#d4af37] font-bold truncate">${s.name_simple}</p><i class="fas fa-play mt-1 text-[7px] text-slate-500"></i></div>`;
            });
        }

        function clearPlaylist() { localStorage.removeItem('userPlaylist'); renderPlaylist(); }

        // --- FONCTIONS GENERALES ---
        function updateLockScreen(title, artist) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title, artist: artist, album: "Audios Islamique", artwork: [{ src: 'audios-islamique-icon.png', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        async function init() {
            const savedPseudo = localStorage.getItem('userPseudo');
            if(!savedPseudo) document.getElementById('registration-overlay').classList.remove('hidden');
            else document.getElementById('user-display').innerText = savedPseudo;
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
            const data = await res.json(); surahs = data.chapters; 
            renderList(surahs); renderHadiths(); renderNames(); initProphets(); fetchHijri(); renderPlaylist();
        }

        async function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value.trim();
            if(!pseudo) return;
            localStorage.setItem('userPseudo', pseudo);
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = pseudo;
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent("✅ NOUVEAU : "+pseudo)}`);
        }

        function play(i, id) {
            currentIdx = i;
            const rec = reciters[document.getElementById('reciter-select').value];
            audio.src = `https://${rec.s}.mp3quran.net/${rec.f}/${String(id).padStart(3,'0')}.mp3`;
            document.getElementById('current-title').innerText = surahs[i].name_simple;
            audio.play(); updateBtn(true); updateLockScreen(surahs[i].name_simple, rec.n);
        }

        function nextSurah() { if(currentIdx < surahs.length - 1) play(currentIdx + 1, surahs[currentIdx + 1].id); }
        function prevSurah() { if(currentIdx > 0) play(currentIdx - 1, surahs[currentIdx - 1].id); }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateBtn(!audio.paused); }
        function updateBtn(p) { playBtn.innerHTML = p ? '<i class="fas fa-pause text-2xl"></i>' : '<i class="fas fa-play text-2xl ml-1"></i>'; document.getElementById('playing-indicator').classList.toggle('hidden', !p); }

        function renderList(data) {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            data.forEach((s, i) => list.innerHTML += `<div onclick="play(${i}, ${s.id})" class="flex items-center justify-between p-4 bg-slate-800/40 rounded-2xl border border-slate-700 cursor-pointer hover:border-[#d4af37] transition"><div class="flex items-center gap-4"><span class="text-[10px] text-[#d4af37] font-bold">${s.id}</span><span class="text-white text-sm font-bold">${s.name_simple}</span></div><span class="text-lg font-quran text-[#d4af37]">${s.name_arabic}</span></div>`);
        }

        function renderHadiths() {
            const list = document.getElementById('hadith-list');
            list.innerHTML = '';
            hadithsData.forEach((item, index) => {
                list.innerHTML += `<div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4"><div class="flex justify-between items-start mb-2"><span class="text-[8px] bg-[#d4af37] text-slate-900 px-2 py-0.5 rounded-full font-bold">#${index+1}</span><p class="text-right font-quran text-[#d4af37] text-lg leading-relaxed" dir="rtl">${item.ar}</p></div><p class="text-xs italic text-white mt-2 leading-relaxed">"${item.fr}"</p></div>`;
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['surahs','hadiths','tasbih','tools'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
        }

        function initProphets() {
            const p = ["Adam", "Idris", "Nuh", "Hud", "Salih", "Ibrahim", "Lut", "Ismail", "Ishaq", "Yaqub", "Yusuf", "Ayoub", "Shuayb", "Musa", "Harun", "Dawud", "Sulayman", "Ilyas", "Al-Yasa", "Yunus", "Zakariya", "Yahya", "Issa", "Muhammad"];
            const list = document.getElementById('prophet-list'); list.innerHTML = '';
            p.forEach(name => list.innerHTML += `<div onclick="showStory('${name}')" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-[10px] text-center text-white font-bold uppercase cursor-pointer hover:border-amber-500 transition">${name}</div>`);
        }

        function showStory(name) {
            window.scrollTo(0, 0);
            document.getElementById('prophet-list').classList.add('hidden');
            document.getElementById('story-display').classList.remove('hidden');
            document.getElementById('story-title').innerText = "Récit du Prophète " + name;
            document.getElementById('story-body').innerHTML = prophetStories[name] || "<h5>Contexte</h5><p>Le récit de ce noble Prophète est un guide pour nous tous.</p><div class='lesson-box'><h6>Leçon</h6><p class='m-0 italic'>La patience et la foi.</p></div>";
        }

        function closeStory() { document.getElementById('story-display').classList.add('hidden'); document.getElementById('prophet-list').classList.remove('hidden'); }
        function renderNames() {
            const names = ["Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar"];
            const list = document.getElementById('names-list');
            names.forEach((name, i) => list.innerHTML += `<div class="name-card p-3 rounded-xl flex justify-between items-center text-[10px] font-bold text-white uppercase shadow-sm"><span>${i+1}. ${name}</span><i class="fas fa-check-circle text-[#d4af37]"></i></div>`);
        }
        async function fetchHijri() { try { const r = await fetch('https://api.aladhan.com/v1/gToH'); const d = await r.json(); document.getElementById('hijri-date').innerText = `${d.data.hijri.day} ${d.data.hijri.month.fr || d.data.hijri.month.en} ${d.data.hijri.year}`; } catch(e){} }
        function incrementTasbih() { let d = document.getElementById('tasbih-display'); d.innerText = parseInt(d.innerText) + 1; }
        function resetTasbih() { document.getElementById('tasbih-display').innerText = 0; }
        function filterSurahs() { const q = document.getElementById('search-input').value.toLowerCase(); renderList(surahs.filter(s => s.name_simple.toLowerCase().includes(q))); }
        function shareApp() { navigator.share({ title: 'Audios Islamique', url: window.location.href }); }
        function seekAudio(v) { if(audio.duration) audio.currentTime = (v/100)*audio.duration; }
        function requestNotificationPermission() { Notification.requestPermission(); }

        init();
    </script>
</body>
</html>
