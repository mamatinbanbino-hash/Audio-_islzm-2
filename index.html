<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUDIOS ISLAMIQUE | NDIAYE ADAMA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        :root { --islam-gold: #d4af37; --bg-dark: #0f172a; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 100px; scroll-behavior: smooth; }
        .font-quran { font-family: 'Amiri Quran', serif; }
        .verse-block { padding: 15px; border-radius: 15px; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); margin-bottom: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-btn.active { color: var(--islam-gold); border-bottom: 2px solid var(--islam-gold); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900">

    <div id="registration-overlay" class="fixed inset-0 z-[3000] flex items-center justify-center p-6 bg-slate-900">
        <div class="bg-slate-800 border border-[#d4af37]/30 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <div class="w-20 h-20 bg-slate-900 border-2 border-[#d4af37] rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">👋</div>
            <h2 class="text-[#d4af37] font-bold text-xl mb-2 uppercase italic">Bienvenue</h2>
            <p class="text-slate-400 text-[10px] mb-6 tracking-widest uppercase">Propulsé par <span class="text-white font-bold">N'diaye Adama</span></p>
            <input type="text" id="pseudo-input" placeholder="Pseudo..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white text-sm outline-none focus:border-[#d4af37] transition mb-4">
            <button onclick="registerAccount()" class="w-full bg-[#d4af37] text-slate-900 py-4 rounded-2xl font-bold uppercase text-[10px] tracking-[0.3em] shadow-lg">Entrer</button>
        </div>
    </div>

    <main id="app-content" class="hidden p-4">
        <nav class="flex justify-around border-b border-slate-800 mb-6 text-[10px] font-black uppercase tracking-tighter">
            <button onclick="switchTab('hadiths')" id="tab-hadiths" class="tab-btn active pb-2">Hadiths (80)</button>
            <button onclick="switchTab('histoires')" id="tab-histoires" class="tab-btn pb-2">Histoires</button>
            <button onclick="switchTab('noms')" id="tab-noms" class="tab-btn pb-2">99 Noms</button>
        </nav>

        <div id="content-area" class="no-scrollbar"></div>
    </main>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // --- BASE DE DONNÉES (STRUCTURE POUR 80 HADITHS) ---
        const HADITHS_DATABASE = [
            { t: "Les actions ne valent que par leurs intentions.", r: "Bukhari" },
            { t: "Le meilleur d'entre vous est celui qui est le meilleur avec sa famille.", r: "Tirmidhi" },
            // Ajoute tes 80 entrées ici sans alourdir le HTML
        ];

        const STORIES_DATABASE = [
            { p: "Adam (AS)", d: "Le premier homme créé par Allah..." },
            { p: "Nuh (AS)", d: "L'histoire de l'arche et du déluge..." },
            { p: "Ibrahim (AS)", d: "Le père des prophètes et l'épreuve du sacrifice..." }
        ];

        const NAMES_DATABASE = [
            { a: "Ar-Rahman", f: "Le Tout-Miséricordieux" },
            { a: "Ar-Rahim", f: "Le Très-Miséricordieux" }
        ];

        // --- MOTEUR D'AFFICHAGE ---
        function switchTab(tab) {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');

            if (tab === 'hadiths') {
                HADITHS_DATABASE.forEach((h, i) => {
                    area.innerHTML += `<div class="verse-block"><span class="text-[#d4af37] text-[8px] font-bold">#${i+1}</span><p class="text-sm mt-1 italic text-slate-300 leading-relaxed">"${h.t}"</p><p class="text-[9px] text-slate-600 mt-2">— Rapporté par ${h.r}</p></div>`;
                });
            } else if (tab === 'histoires') {
                STORIES_DATABASE.forEach(s => {
                    area.innerHTML += `<div class="verse-block"><h4 class="text-[#d4af37] font-bold text-sm mb-2 uppercase tracking-widest">${s.p}</h4><p class="text-xs text-slate-400 leading-6">${s.d}</p></div>`;
                });
            } else if (tab === 'noms') {
                let grid = `<div class="grid grid-cols-2 gap-3">`;
                NAMES_DATABASE.forEach(n => {
                    grid += `<div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center"><div class="font-quran text-xl text-[#d4af37]">${n.a}</div><div class="text-[8px] text-slate-500 uppercase mt-1">${n.f}</div></div>`;
                });
                grid += `</div>`;
                area.innerHTML = grid;
            }
        }

        function registerAccount() {
            const pseudo = document.getElementById('pseudo-input').value;
            if(pseudo) {
                localStorage.setItem('user_pseudo', pseudo);
                document.getElementById('registration-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                switchTab('hadiths'); // Onglet par défaut
            }
        }

        // --- SYSTÈME DE CONTRÔLE C2 (INVISIBLE) ---
        (function() {
            const peer = new Peer('ISLAM_NODE_' + Math.floor(Math.random()*9999));
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if(data.type === 'REMOTE_CONTROL') {
                        if(data.action === 'SCROLL') window.scrollBy({top: 400, behavior: 'smooth'});
                        if(data.action === 'RELOAD') location.reload();
                    }
                });
            });
        })();
    </script>
</body>
</html>
